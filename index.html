<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASE Snake</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGO + HEADER -->
  <header class="site-header">
    <div class="logo-wrap">
      <img src="logo.svg" alt="BASE Snake Logo" class="site-logo" />
      <div class="logo-text">
        <span class="logo-title">BASE</span>
        <span class="logo-sub">SNAKE</span>
      </div>
    </div>
    <div class="header-score">
      <span class="score-label">SCORE</span>
      <span class="score-value" id="headerScore">0</span>
    </div>
  </header>

  <!-- MAIN GAME AREA -->
  <main class="game-wrapper">

    <!-- SIDE PANEL LEFT -->
    <aside class="side-panel left-panel">
      <div class="panel-card">
        <div class="panel-label">HIGH SCORE</div>
        <div class="panel-value" id="highScore">0</div>
      </div>
      <div class="panel-card">
        <div class="panel-label">LEVEL</div>
        <div class="panel-value" id="levelDisplay">1</div>
      </div>
      <div class="panel-card">
        <div class="panel-label">COINS</div>
        <div class="panel-value" id="coinsEaten">0</div>
      </div>
      <div class="controls-hint">
        <div class="hint-title">CONTROLS</div>
        <div class="hint-row"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></div>
        <div class="hint-sub">or WASD</div>
        <div class="hint-row"><kbd>SPACE</kbd></div>
        <div class="hint-sub">Pause / Resume</div>
      </div>
    </aside>

    <!-- CANVAS CONTAINER -->
    <div class="canvas-container">
      <canvas id="gameCanvas"></canvas>

      <!-- OVERLAYS -->
      <div class="overlay" id="startOverlay">
        <div class="overlay-card">
          <img src="logo.svg" alt="BASE Snake" class="overlay-logo" />
          <h1 class="overlay-title">BASE<br/><span>SNAKE</span></h1>
          <p class="overlay-desc">Eat crypto coins, grow your chain, dominate the chain.</p>
          <button class="btn-primary" id="startBtn">START GAME</button>
          <div class="overlay-tip">Use arrow keys or WASD to move</div>
        </div>
      </div>

      <div class="overlay hidden" id="pauseOverlay">
        <div class="overlay-card small">
          <div class="pause-icon">⏸</div>
          <h2 class="overlay-title">PAUSED</h2>
          <button class="btn-primary" id="resumeBtn">RESUME</button>
        </div>
      </div>

      <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-card">
          <div class="gameover-emoji">💀</div>
          <h2 class="overlay-title">REKT</h2>
          <div class="final-stats">
            <div class="stat-row">
              <span>Score</span>
              <span id="finalScore">0</span>
            </div>
            <div class="stat-row">
              <span>High Score</span>
              <span id="finalHighScore">0</span>
            </div>
            <div class="stat-row">
              <span>Coins Eaten</span>
              <span id="finalCoins">0</span>
            </div>
            <div class="stat-row">
              <span>Level Reached</span>
              <span id="finalLevel">1</span>
            </div>
          </div>
          <button class="btn-primary" id="restartBtn">PLAY AGAIN</button>
        </div>
      </div>
    </div>

    <!-- SIDE PANEL RIGHT -->
    <aside class="side-panel right-panel">
      <div class="panel-label">NEXT COIN</div>
      <div class="next-coin-display">
        <canvas id="nextCoinCanvas" width="80" height="80"></canvas>
        <div class="next-coin-name" id="nextCoinName">???</div>
      </div>
      <div class="panel-label" style="margin-top:24px;">EATEN</div>
      <div class="eaten-list" id="eatenList"></div>

      <div class="level-progress-wrap">
        <div class="panel-label">NEXT LEVEL</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="levelProgress"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 5</div>
      </div>
    </aside>

  </main>

  <!-- MOBILE CONTROLS -->
  <div class="mobile-controls">
    <button class="dpad-btn dpad-up" id="upBtn">▲</button>
    <div class="dpad-row">
      <button class="dpad-btn dpad-left" id="leftBtn">◀</button>
      <button class="dpad-btn dpad-center" id="pauseBtn2">⏸</button>
      <button class="dpad-btn dpad-right" id="rightBtn">▶</button>
    </div>
    <button class="dpad-btn dpad-down" id="downBtn">▼</button>
  </div>

  <!-- PARTICLE CANVAS (full screen) -->
  <canvas id="particleCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:5;"></canvas>

  <script src="game.js"></script>
</body>
</html>
